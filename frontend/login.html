<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login/Register - Internship Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Internship Management System</h1>
        <p>Student Portal</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" onclick="showAuthTab('login')">Login</button>
        <button class="tab-btn" onclick="showAuthTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form active">
        <h2>Student Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <input type="email" id="loginEmail" placeholder="Email" required>
          </div>
          <div class="form-group">
            <input type="password" id="loginPassword" placeholder="Password" required>
          </div>
          <button type="submit" class="btn-primary">Login</button>
        </form>
        <div class="auth-links">
          <a href="admin-login.html">Admin Login</a>
        </div>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form">
        <h2>Student Registration</h2>
        <form id="registerForm">
          <div class="form-group">
            <input type="text" id="registerName" placeholder="Full Name" required>
          </div>
          <div class="form-group">
            <input type="text" id="registerRollNumber" placeholder="Roll Number" required>
          </div>
          <div class="form-group">
            <input type="email" id="registerEmail" placeholder="Email" required>
          </div>
          <div class="form-group">
            <select id="registerDepartment" required>
              <option value="">Select Department</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Electronics">Electronics</option>
              <option value="Mechanical">Mechanical</option>
              <option value="Civil">Civil</option>
              <option value="Electrical">Electrical</option>
              <option value="Information Technology">Information Technology</option>
            </select>
          </div>
          <div class="form-group">
            <select id="registerAcademicYear" required>
              <option value="">Select Academic Year</option>
              <option value="2023-24">2023-24</option>
              <option value="2024-25">2024-25</option>
              <option value="2025-26">2025-26</option>
            </select>
          </div>
          <div class="form-group">
            <input type="password" id="registerPassword" placeholder="Password" required>
          </div>
          <div class="form-group">
            <input type="password" id="registerConfirmPassword" placeholder="Confirm Password" required>
          </div>
          <button type="submit" class="btn-primary">Register</button>
        </form>
        <div class="auth-links">
          <a href="admin-login.html">Admin Login</a>
        </div>
      </div>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
