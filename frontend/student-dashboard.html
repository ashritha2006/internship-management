<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard - Internship Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-container">
    <div class="navbar">
      <div class="nav-brand">
        <h2>Student Dashboard</h2>
      </div>
      <div class="nav-user">
        <span id="userInfo"></span>
        <button onclick="logout()" class="btn-secondary">Logout</button>
      </div>
    </div>

    <div class="dashboard-content">
      <div class="stats-section">
        <div class="stat-card">
          <h3>Approved Internships</h3>
          <div class="stat-number" id="approvedCount">0</div>
        </div>
        <div class="stat-card">
          <h3>Pending Internships</h3>
          <div class="stat-number" id="pendingCount">0</div>
        </div>
        <div class="stat-card">
          <h3>Total Internships</h3>
          <div class="stat-number" id="totalCount">0</div>
        </div>
      </div>

      <div class="tabs-section">
        <button class="tab-btn active" onclick="showTab('form')">Add Internship</button>
        <button class="tab-btn" onclick="showTab('table')">View Internships</button>
      </div>

      <!-- Add Internship Form -->
      <div id="form" class="tab active">
        <h2>Add Internship</h2>
        <form id="internshipForm">
          <div class="form-row">
            <div class="form-group">
              <input type="text" id="companyName" placeholder="Company Name" required>
            </div>
            <div class="form-group">
              <input type="text" id="location" placeholder="Location" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <input type="date" id="startDate" required>
            </div>
            <div class="form-group">
              <input type="date" id="endDate" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <input type="text" id="duration" placeholder="Duration (e.g., 2 months)" required>
            </div>
            <div class="form-group">
              <input type="text" id="stipend" placeholder="Stipend">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <input type="text" id="mentorName" placeholder="Mentor Name">
            </div>
            <div class="form-group">
              <input type="text" id="mentorContact" placeholder="Mentor Contact">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <select id="semester" required>
                <option value="">Select Semester</option>
                <option value="1st Semester">1st Semester</option>
                <option value="2nd Semester">2nd Semester</option>
                <option value="3rd Semester">3rd Semester</option>
                <option value="4th Semester">4th Semester</option>
                <option value="5th Semester">5th Semester</option>
                <option value="6th Semester">6th Semester</option>
                <option value="7th Semester">7th Semester</option>
                <option value="8th Semester">8th Semester</option>
              </select>
            </div>
            <div class="form-group">
              <select id="affidavit" required>
                <option value="">Affidavit Submitted?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </div>
          </div>
          
          <button type="submit" class="btn-primary">Add Internship</button>
        </form>
      </div>

      <!-- Internship Table -->
      <div id="table" class="tab">
        <h2>My Internships</h2>
        
        <div class="filter-section">
          <div class="form-group">
            <select id="yearFilter" onchange="filterByYear()">
              <option value="">All Years</option>
              <option value="2023-24">2023-24</option>
              <option value="2024-25">2024-25</option>
              <option value="2025-26">2025-26</option>
            </select>
          </div>
          <div class="form-group">
            <select id="statusFilter" onchange="filterByStatus()">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="declined">Declined</option>
            </select>
          </div>
        </div>

        <div class="table-wrapper">
          <table id="internshipTable">
            <thead>
              <tr>
                <th>Company</th>
                <th>Location</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Duration</th>
                <th>Semester</th>
                <th>Affidavit</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="student-dashboard.js"></script>
</body>
</html>
